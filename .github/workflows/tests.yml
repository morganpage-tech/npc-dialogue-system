name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Run structure tests
      run: python3 test_structure.py
    
    - name: Verify imports
      run: |
        python3 -c "from npc_dialogue import NPCDialogue, NPCManager; print('✅ Imports work')"
    
    - name: Check character cards exist
      run: |
        ls -l character_cards/*.json || exit 1

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    
    - name: Run flake8
      run: |
        flake8 npc_dialogue.py --max-line-length=100 --exclude=.git,__pycache__
        flake8 main.py --max-line-length=100 --exclude=.git,__pycache__

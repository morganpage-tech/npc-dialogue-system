name: Character Cards Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Validate JSON files
      run: |
        echo "Validating character card JSON files..."
        
        for file in character_cards/*.json; do
          echo "Checking: $file"
          python3 -c "import json; json.load(open('$file'))"
          echo "  ✅ Valid JSON"
        done
    
    - name: Check required fields
      run: |
        echo "Checking required fields in character cards..."
        
        for file in character_cards/*.json; do
          name=$(basename "$file" .json)
          
          for field in name description personality speaking_style first_mes; do
            if ! grep -q "\"$field\"" "$file"; then
              echo "  ❌ Missing field: $field in $name"
              exit 1
            fi
          done
          
          echo "  ✅ $name: All required fields present"
        done
    
    - name: Check example dialogues
      run: |
        echo "Checking example dialogues in character cards..."
        
        for file in character_cards/*.json; do
          name=$(basename "$file" .json)
          
          if ! grep -q "mes_example" "$file"; then
            echo "  ⚠️  Warning: $name has no mes_example field"
          fi
        done
